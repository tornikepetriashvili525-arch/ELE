<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>სიურპრიზი ცქნაფასთვის</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fff5f8;
            font-family: 'Noto Sans Georgian', sans-serif;
            overflow-x: hidden;
            text-align: center;
        }

        /* საწყისი ღილაკი */
        #start-button {
            padding: 18px 35px;
            font-size: 1.3rem;
            background-color: #ff8fab;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 143, 171, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            z-index: 20;
        }

        #start-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 143, 171, 0.6);
        }

        /* მთავარი კონტეინერი */
        #main-content {
            display: none;
            opacity: 0;
            transition: opacity 2s;
            width: 100%;
            padding: 20px;
            position: relative;
        }

        h1 {
            color: #d63384;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        /* ფოტოების გალერეა */
        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .photo-container {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .photo-container:hover {
            transform: scale(1.03);
        }

        .photo-item {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        /* საბოლოო ტექსტი */
        #final-message {
            display: none;
            font-size: 4rem;
            color: white;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(214, 51, 132, 0.85);
            padding: 20px 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(214, 51, 132, 0.5);
            z-index: 50;
            animation: bounceIn 1.5s ease;
        }

        /* შროშანების (Lilies) და გულების ანიმაცია */
        .falling-item {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.8;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes bounceIn {
            0%, 20%, 40%, 60%, 80%, 100% { animation-timing-function: cubic-bezier(0.215, 0.610, 0.355, 1.000); }
            0% { opacity: 0; transform: translate(-50%, -50%) scale3d(.3, .3, .3); }
            20% { transform: translate(-50%, -50%) scale3d(1.1, 1.1, 1.1); }
            40% { transform: translate(-50%, -50%) scale3d(.9, .9, .9); }
            60% { opacity: 1; transform: translate(-50%, -50%) scale3d(1.03, 1.03, 1.03); }
            80% { transform: translate(-50%, -50%) scale3d(.97, .97, .97); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale3d(1, 1, 1); }
        }

        /* მობილური ვერსიის ოპტიმიზაცია */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .photo-item { height: 250px; }
            #final-message { font-size: 2.5rem; padding: 15px 30px; }
        }
    </style>
</head>
<body>

    <button id="start-button" onclick="showSurprise()">🎁 სპეციალურად ცქნაფასთვის...</button>

    <div id="main-content">
        <h1>ჩემი საყვარელი წუთები ❤️</h1>

        <div class="photo-gallery">
            <div class="photo-container">
                <img src="შენი_ფოტოს_ლინკი_1" alt="ჩვენი ფოტო" class="photo-item">
            </div>
            <div class="photo-container">
                <img src="შენი_ფოტოს_ლინკი_2" alt="ჩვენი ფოტო" class="photo-item">
            </div>
            <div class="photo-container">
                <img src="შენი_ფოტოს_ლინკი_3" alt="ჩვენი ფოტო" class="photo-item">
            </div>
            <div class="photo-container">
                <img src="შენი_ფოტოს_ლინკი_4" alt="ჩვენი ფოტო" class="photo-item">
            </div>
        </div>

        <button id="start-button" style="margin-top: 40px; background-color: #d63384;" onclick="showFinalMessage()">მზად ხარ? ❤️</button>
    </div>

    <div id="final-message">I Love You</div>

    <script>
        // შროშანასა და გულის სურათების ონლაინ-ლინკები (შეგიძლია შეცვალო)
        const lilyImg = 'https://cdn-icons-png.flaticon.com/512/3233/3233497.png';
        const heartImg = 'https://cdn-icons-png.flaticon.com/512/2589/2589175.png';

        function showSurprise() {
            document.getElementById('start-button').style.display = 'none';
            const content = document.getElementById('main-content');
            content.style.display = 'block';
            setTimeout(() => { content.style.opacity = '1'; }, 50);
            
            document.body.style.background = "linear-gradient(to bottom, #fff5f8, #ffe3ec)";

            // ცვენის დაწყება
            startFallingItems();
        }

        function startFallingItems() {
            setInterval(createFallingItem, 150); // ყოველ 0.15 წამში ახალი ნივთი
        }

        function createFallingItem() {
            const item = document.createElement('div');
            item.classList.add('falling-item');
            
            // შემთხვევითად ვირჩევთ ან შროშანას, ან გულს
            if (Math.random() > 0.4) {
                item.style.backgroundImage = `url(${lilyImg})`;
                item.style.width = '35px';
                item.style.height = '35px';
            } else {
                item.style.backgroundImage = `url(${heartImg})`;
                item.style.width = '25px';
                item.style.height = '25px';
            }
            
            item.style.left = Math.random() * 100 + "vw";
            item.style.animationName = 'fall';
            item.style.animationTimingFunction = 'linear';
            item.style.animationDuration = (Math.random() * 4 + 3) + "s"; // 3-7 წამი
            
            document.body.appendChild(item);
            
            // წაშლა ანიმაციის დამთავრების შემდეგ
            setTimeout(() => {
                item.remove();
            }, 7000);
        }

        function showFinalMessage() {
            // გალერეის გაქრობა
            document.getElementById('main-content').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('main-content').style.display = 'none';
                
                // საბოლოო მესიჯის გამოჩენა
                const finalMsg = document.getElementById('final-message');
                finalMsg.style.display = 'block';
                
                // ფონის გამუქება
                document.body.style.background = "#1a1a1a";
                
                // ბევრი გულის ცვენა
                for(let i=0; i<50; i++) {
                    setTimeout(createFinalHeart, i * 100);
                }
            }, 2000);
        }

        function createFinalHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-item');
            heart.style.backgroundImage = `url(${heartImg})`;
            heart.style.width = '30px';
            heart.style.height = '30px';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.top = Math.random() * 100 + "vh";
            heart.style.opacity = '0.8';
            heart.style.zIndex = '40';
            heart.style.animation = 'fadeInOut 4s ease-in-out infinite';
            
            document.body.appendChild(heart);
        }
    </script>
</body>
</html>
